{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Resume Skill Gap Analyzer</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<div class="auth-page">
    <div class="card">
        <h2>Login</h2>

        {% if messages %}
        <div class="messages" style="margin-bottom: 15px;">
            {% for message in messages %}
            <p style="color: #ff6b6b; text-align: center; margin: 0;">{{ message }}</p>
            {% endfor %}
        </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <input 
                type="email" 
                name="email" 
                placeholder="Email address" 
                required
            >

            <input 
                type="password" 
                name="password" 
                placeholder="Password" 
                required
            >

            <button type="submit" class="btn">
                Login
            </button>
        </form>

        <p class="auth-link">
            Don't have an account?
            <a href="{% url 'signup' %}">Create one</a>
        </p>
    </div>
</div>

</body>
</html>
